name: gym_tracker
description: A personal gym progress tracker with Solo Leveling aesthetic
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Images
  image_picker: ^1.0.7

  # File System
  path_provider: ^2.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

  # UI/UX
  google_fonts: ^6.2.1

  # Routing
  go_router: ^13.2.0

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation (Hive model adapters only)
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  
flutter:
  uses-material-design: true
